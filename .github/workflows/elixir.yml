name: Elixir

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    uses: leandrocp/github-actions/.github/workflows/elixir-test.yml@main
    with:
      env_vars: '{"MDEX_NATIVE_BUILD": "1"}'

  coverage:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    uses: leandrocp/github-actions/.github/workflows/elixir-test.yml@main
    with:
      pairs: '[{"name":"OTP 29, Elixir main", "elixir":"main-otp-29", "otp":"maint-29"}]'
      env_vars: '{"MDEX_NATIVE_BUILD": "1"}'
      coverage: true

  lint:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    uses: leandrocp/github-actions/.github/workflows/elixir-lint.yml@main
    with:
      env_vars: '{"MDEX_NATIVE_BUILD": "1"}'

  e2e:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - uses: dtolnay/rust-toolchain@stable

      - run: ./test/e2e/run.sh
