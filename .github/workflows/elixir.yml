name: Elixir

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    uses: leandrocp/github-actions/.github/workflows/elixir-test.yml@main
    with:
      env_vars: '{"MDEX_NATIVE_BUILD": "1"}'

  coverage:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    uses: leandrocp/github-actions/.github/workflows/elixir-test.yml@main
    with:
      pairs: '[{"name":"OTP 29, Elixir main", "elixir":"main-otp-29", "otp":"maint-29"}]'
      env_vars: '{"MDEX_NATIVE_BUILD": "1"}'
      coverage: true

  lint:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    uses: leandrocp/github-actions/.github/workflows/elixir-lint.yml@main
    with:
      pairs: '[{"name":"OTP 29, Elixir main", "elixir":"main-otp-29", "otp":"maint-29"}]'
      env_vars: '{"MDEX_NATIVE_BUILD": "1"}'
      credo: true

  e2e:
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
    name: e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Cache Mix deps
        uses: actions/cache@v5
        with:
          path: |
            ~/.hex
            ~/.mix
            integration_test/tmp/workspace/deps
            integration_test/tmp/workspace/_build
          key: e2e-mix-${{ runner.os }}-${{ hashFiles('mix.exs', 'integration_test/mix.exs', 'integration_test/fixtures/dummy_app/mix.exs') }}
          restore-keys: |
            e2e-mix-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/mdex_native_nif -> integration_test/tmp/cargo_target/default
            native/mdex_native_nif -> integration_test/tmp/cargo_target/lumis
            native/mdex_native_nif -> integration_test/tmp/cargo_target/syntect
          shared-key: e2e

      - name: Run integration tests
        working-directory: integration_test
        env:
          MIX_ENV: test
          MDEX_NATIVE_BUILD: "1"
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "10"
        run: |
          mix deps.get
          mix test
